services:
  postgres:
    image: postgres:16-alpine
    container_name: goreview-postgres
    environment:
      POSTGRES_DB: goreview
      POSTGRES_USER: goreview
      POSTGRES_PASSWORD: goreview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
